databases:
  - name: mystore-db
    databaseName: ecommerce
    user: root
    plan: free

envVarGroups:
  - name: shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true

services:
  # 1. Discovery Service
  - type: web
    name: discovery-service
    runtime: docker
    dockerContext: .
    dockerfile: discovery-service/Dockerfile
    plan: free
    healthCheckPath: /

  # 2. Auth Service
  - type: web
    name: auth-service
    runtime: docker
    dockerContext: .
    dockerfile: auth-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mystore-db:3306/ecommerce_auth?createDatabaseIfNotExist=true
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: mystore-db
          property: password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - fromGroup: shared-secrets

  # 3. Product Service
  - type: web
    name: product-service
    runtime: docker
    dockerContext: .
    dockerfile: product-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mystore-db:3306/ecommerce_product?createDatabaseIfNotExist=true
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: mystore-db
          property: password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/

  # 4. Order Service
  - type: web
    name: order-service
    runtime: docker
    dockerContext: .
    dockerfile: order-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://mystore-db:3306/ecommerce_order?createDatabaseIfNotExist=true
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: mystore-db
          property: password
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # 5. Gateway Service
  - type: web
    name: gateway-service
    runtime: docker
    dockerContext: .
    dockerfile: gateway-service/Dockerfile
    plan: free
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-service:8761/eureka/
      - fromGroup: shared-secrets

  # 6. Frontend
  - type: web
    name: mystore-frontend
    runtime: docker
    dockerContext: .
    dockerfile: frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_GATEWAY_URL
        fromService:
          name: gateway-service
          type: web
          property: host
